services:
  shopping-assistant:
    build: .
    container_name: shopping-assistant
    ports:
      - "5060:5060"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5060/healthz')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
