server:
  host: "0.0.0.0"
  port: 5060
  cors_origins: ["*"]

llm:
  fast:
    provider: "gemini"
    model: "gemini-3-flash-preview"
  quality:
    provider: "gemini"
    model: "gemini-3-flash-preview"
  suggestion:
    provider: "gemini"
    model: "gemini-3-flash-preview"
  providers:
    gemini:
      api_key_env: "GOOGLE_API_KEY"
      vertexai: true
    openai:
      api_key_env: "OPENAI_API_KEY"
    qwen:
      api_key_env: "QWEN_API_KEY"
      base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    kimi:
      api_key_env: "KIMI_API_KEY"
      base_url: "https://api.moonshot.cn/v1"
    glm:
      api_key_env: "GLM_API_KEY"
      base_url: "https://open.bigmodel.cn/api/paas/v4/"
  temperature: 0.3
  max_retries: 2
  timeout_seconds: 30

dataforseo:
  base_url: "https://api.dataforseo.com/v3"
  timeout_seconds: 15
  max_retries: 2
  default_locale: "en"
  default_language: "en"

cache:
  sqlite_path: "./data/cache.db"
  json_legacy_path: "./data/cache"
  ttl:
    base_card_hours: 24
    product_info_days: 7
    sellers_hours: 6
    reviews_days: 7

storage:
  sqlite_path: "./data/sessions.db"
  event_log_path: "./data/events"

stream:
  heartbeat_interval_seconds: 20
  buffer_max_events: 1000
  event_version: "v1"

agent:
  max_candidates: 30
  top_n: 3
  detail_fetch_timeout_seconds: 30
  max_concurrent_fetches: 9
